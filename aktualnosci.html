  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

--muted: #9ca3af;

  --font-head: 'Barlow Condensed', sans-serif;
--font-body: 'Barlow', sans-serif;
}

body {
  background: var(--white);
color: var(--ink);
font-family: var(--font-body);
font-size: 17px;
line-height: 1.65;

}

nav {

height: 64px;
display: flex; align-items: center; justify-content: space-between;

.page-header { background: var(--ink); padding: 160px 40px 64px; }
.page-header-inner { max-width: 1200px; margin: 0 auto; }
.section-eyebrow { font-family: var(--font-head); font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--amber); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.section-eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--amber); display: block; }
  .page-title { font-family: var(--font-head); font-size: clamp(40px, 6vw, 72px); font-weight: 900; color: var(--white); line-height: 0.95; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 16px; }
.page-sub { font-size: 17px; color: rgba(255,255,255,0.7); max-width: 560px; }

.filters-bar { background: var(--off); border-bottom: 1px solid var(--border-light); padding: 24px 40px; position: sticky; top: 64px; z-index: 100; }
.filters-inner { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 10px; }
.filter-btn { font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink); background: var(--white); border: 1px solid var(--border-light); border-radius: 999px; padding: 10px 20px; cursor: pointer; transition: all 0.2s; }
.filter-btn:hover { border-color: var(--amber); }
.filter-btn.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

.news-section { padding: 64px 40px 96px; background: var(--white); }
.news-inner { max-width: 1200px; margin: 0 auto; }
.news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.news-card { background: var(--white); border: 1px solid var(--border-light); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; gap: 14px; transition: transform 0.2s, border-color 0.2s; }
.news-card:hover { transform: translateY(-3px); border-color: var(--amber); }
.news-card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 10px; margin-bottom: 4px; }
.news-pill { align-self: flex-start; font-family: var(--font-head); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 14px; border-radius: 999px; background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,158,11,0.25); }
.news-pill.tag-realizacja { background: rgba(59,130,246,0.1); color: #3b82f6; border-color: rgba(59,130,246,0.25); }
.news-pill.tag-zgodnosc { background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.25); }
.news-pill.tag-serwis { background: rgba(16,185,129,0.1); color: #10b981; border-color: rgba(16,185,129,0.25); }
.news-date { font-size: 13px; color: var(--mid); font-weight: 500; }
.news-card h3 { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: var(--ink); text-transform: uppercase; line-height: 1.15; }
.news-card p { font-size: 15px; color: #374151; line-height: 1.65; }
.news-empty { text-align: center; padding: 60px 20px; color: var(--mid); font-size: 16px; grid-column: 1 / -1; }

footer { background: var(--ink2); border-top: 1px solid rgba(255,255,255,0.06); padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }

@media (max-width: 900px) {

  <script>
  const MIESIACE = ["stycznia","lutego","marca","kwietnia","maja","czerwca","lipca","sierpnia","września","października","listopada","grudnia"];

function formatujDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
return `${d} ${MIESIACE[m-1]} ${y}`;
}

function kartaHTML(post) {
const img = post.image ? `<img class="news-card-img" src="${post.image}" alt="${post.title}" loading="lazy">` : "";
return `
<article class="news-card" data-category="${post.category}">
${img}
<span class="news-pill tag-${post.category}">${post.categoryLabel}</span>
<span class="news-date">${formatujDate(post.date)}</span>
<h3>${post.title}</h3>
<p>${post.excerpt}</p>
</article>`;
}

function renderuj(filtr) {
const grid = document.getElementById("news-grid");
const posty = PROLIGHT_POSTS
.slice()
.sort((a,b) => new Date(b.date) - new Date(a.date))
.filter(p => filtr === "wszystkie" || p.category === filtr);

grid.innerHTML = posty.length
? posty.map(kartaHTML).join("")
: '<p class="news-empty">Brak wpisów w tej kategorii.</p>';
}

function renderujFiltry() {
const pasek = document.getElementById("filters");
const wszystkie = [{ slug: "wszystkie", label: "Wszystkie" }, ...PROLIGHT_CATEGORIES];
pasek.innerHTML = wszystkie.map((c, i) =>
`<button class="filter-btn${i===0 ? ' active' : ''}" data-filter="${c.slug}">${c.label}</button>`
).join("");

pasek.querySelectorAll(".filter-btn").forEach(btn => {
btn.addEventListener("click", () => {
pasek.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
btn.classList.add("active");
renderuj(btn.dataset.filter);
});
});
}

renderujFiltry();
renderuj("wszystkie");
</script>
